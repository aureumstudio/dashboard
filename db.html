<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Factures</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  margin:0;
  padding:30px;
}

.card{
  background:#fff;
  max-width:650px;
  margin:auto;
  padding:30px;
  border-radius:14px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
}

button{
  border:none;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  margin-top:8px;
}

.upload{
  width:100%;
  background:#111827;
  color:#fff;
}

.fileBtn{
  width:100%;
  text-align:left;
  background:#eef2ff;
}

#files{
  margin-top:20px;
}
</style>
</head>

<body>

<div class="card">

<h2>Envoyer une facture</h2>

<input type="file" id="factureFile">

<button class="upload" onclick="uploadFacture()">
Envoyer
</button>

<div id="status"></div>

<h3>Factures enregistrées</h3>

<div id="files"></div>

</div>

<script type="module">
import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://bbpsuzovrmuiikdgqnrd.supabase.co',
  'sb_publishable_YRH_3vsASV_R6DEb6-KvLQ_0qPV9KIQ'
)

const filesDiv =
  document.getElementById('files')

async function loadFiles(){

  filesDiv.innerHTML='Chargement...'

  const { data, error } =
    await supabase.storage
      .from('factures')
      .list()

  if(error){
    filesDiv.innerHTML =
      'Erreur : ' + error.message
    return
  }

  filesDiv.innerHTML=''

  data.forEach(file => {

    const btn =
      document.createElement('button')

    btn.className='fileBtn'
    btn.textContent=file.name

    btn.onclick = async () => {

      const { data, error } =
        await supabase.storage
          .from('factures')
          .download(file.name)

      if(error){
        alert(error.message)
        return
      }

      const url =
        URL.createObjectURL(data)

      const a =
        document.createElement('a')

      a.href = url
      a.download = file.name

      document.body.appendChild(a)

      a.click()

      a.remove()

      URL.revokeObjectURL(url)
    }

    filesDiv.appendChild(btn)
  })
}

window.uploadFacture = async () => {

  const file =
    document.getElementById('factureFile').files[0]

  if(!file) return

  // Nettoyage du nom pour éviter l'erreur "Invalid key" (accents, espaces, &)
  const safeName = file.name.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9.]/gi, '_').replace(/_{2,}/g, '_');

  const path =
    `${Date.now()}-${safeName}`

  const { error } =
    await supabase.storage
      .from('factures')
      .upload(path,file)

  if(error){
    alert(error.message)
    return
  }

  await loadFiles()
}

loadFiles()
</script>

</body>
</html>
